name: ci pipeline

on:
  push:
    branches: [ main ]

jobs:
  build: 
    runs-on: ubuntu-latest

    steps:
      - name: checkout code
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with: 
          node-version: 18

      - name: install dependencies
        run: npm install
        
      - name: Run tests
        run: npm test